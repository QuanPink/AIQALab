# ── Dev Environment Configuration ──────────────────────────────
# Switch with: mvn test -Denv=dev  (default)

# Application URLs
base.url=https://app.copin.io/
api.base.url=https://api.copin.io

# Auth
# Secret — do NOT put real tokens here.
# Provide via OS env var:  export API_TOKEN=your-token
# or JVM property:         mvn test -Dapi.token=your-token
# api.token is intentionally absent — ConfigManager will read API_TOKEN env var.

# Browser
browser=chrome
headless=false

# Timeouts (seconds)
explicit.wait.seconds=15
page.load.timeout=30

# Retry
retry.max.count=2

# API
api.logging.enabled=true

# Waits
short.wait.seconds=5

# UI test credentials (non-sensitive defaults for dev only)
# Replace with real test-account values or inject via TEST_USERNAME / TEST_PASSWORD env vars
test.username=admin@example.com
test.password=Admin@123

# Rate-limit test: use a dedicated "canary" account safe to lock out
# test.canary.email=canary@example.com
rate.limit.attempts=5
