# ── Production Environment Configuration ───────────────────────
# Switch with: mvn test -Denv=prod
# WARNING: Only run smoke tests against production!

# Application URLs
base.url=https://yourapp.com
api.base.url=https://api.yourapp.com

# Auth
# Secret — injected by CI/CD via:  API_TOKEN secret variable
# api.token is intentionally absent — ConfigManager will read API_TOKEN env var.

# Browser
browser=chrome
headless=true

# Timeouts (seconds)
explicit.wait.seconds=25
page.load.timeout=60

# Retry
retry.max.count=1

# API
api.logging.enabled=false

# Waits
short.wait.seconds=8
