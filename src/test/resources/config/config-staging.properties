# ── Staging Environment Configuration ──────────────────────────
# Switch with: mvn test -Denv=staging

# Application URLs
base.url=https://staging.yourapp.com
api.base.url=https://api.staging.yourapp.com

# Auth
# Secret — injected by CI/CD via:  API_TOKEN secret variable
# api.token is intentionally absent — ConfigManager will read API_TOKEN env var.

# Browser
browser=chrome
headless=true

# Timeouts (seconds)
explicit.wait.seconds=20
page.load.timeout=45

# Retry
retry.max.count=2

# API
api.logging.enabled=false

# Waits
short.wait.seconds=5
